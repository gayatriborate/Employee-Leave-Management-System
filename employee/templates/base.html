<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Leave Management</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 28px;
        }

        footer {
            margin-top: auto;
        }
    </style>

</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

        <div class="container">

            <a class="navbar-brand" href="/">
                <i class="bi bi-building"></i>
                Employee Leave Management
            </a>

           <div>
   

    {% if user.is_authenticated %}

        {% if user.is_superuser %}

            <a href="{% url 'home' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-house"></i>
                Home
            </a>

            <a href="{% url 'employee_list' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-people"></i>
                Employees
            </a>

            <a href="{% url 'leave_list' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-calendar-check"></i>
                Leaves
            </a>

            <a href="{% url 'dashboard' %}" class="btn btn-warning me-2">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>

        {% else %}

            <a href="{% url 'home' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-house"></i>
                Home
            </a>

            <a href="{% url 'apply_leave' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-calendar-plus"></i>
                Apply Leave
            </a>

            <a href="{% url 'leave_list' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-card-list"></i>
                My Leaves
            </a>

        {% endif %}

        <a href="{% url 'logout' %}" class="btn btn-danger">
            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    {% endif %}

</div>



        </div>

    </nav>

    <!-- Main Content -->

    <div class="container flex-grow-1 mt-5">

        {% block content %}

        {% endblock %}

    </div>

    <!-- Footer -->

    <footer class="bg-dark text-white text-center py-3">

        <h6>© 2026 Employee Leave Management System</h6>

        <p class="mb-0">
            Developed By <strong>Gayatri Borate</strong>
        </p>

    </footer>

</body>

</html>
